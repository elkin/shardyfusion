site_name: shardyfusion
site_description: Sharded SlateDB/SQLite snapshot writer/reader library
site_url: https://elkin.github.io/shardyfusion/
repo_url: https://github.com/elkin/shardyfusion
repo_name: elkin/shardyfusion

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            show_source: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: how-it-works.md
  - Writers:
    - Overview: writer.md
    - Spark: writers/spark.md
    - Dask: writers/dask.md
    - Ray: writers/ray.md
    - Python: writers/python.md
  - Reader: reader.md
  - Vector Search: vector-search.md
  - Manifest Stores: manifest-stores.md
  - CLI (shardy): cli.md
  - Observability: observability.md
  - Error Handling: error-handling.md
  - Engineering Notes:
    - 2026-03-14 Manifest History & Rollback: engineering-notes/2026-03-14-manifest-history-and-rollback.md
    - 2026-03-15 Reliable Loser Cleanup Plan: engineering-notes/2026-03-15-reliable-loser-cleanup-plan.md
    - 2026-03-24 Test Coverage Gap Closure: engineering-notes/2026-03-24-test-coverage-gap-closure.md
    - 2026-03-25 Consistent Writer Retry: engineering-notes/2026-03-25-consistent-writer-retry.md
    - 2026-03-25 Run Registry For Deferred Cleanup: engineering-notes/2026-03-25-run-registry-for-deferred-cleanup.md
    - 2026-03-28 Categorical CEL Routing: engineering-notes/2026-03-28-categorical-cel-routing.md
    - 2026-04-04 Sharded Vector Search: engineering-notes/2026-04-04-sharded-vector-search.md
    - 2026-04-06 Vector Search Review: engineering-notes/2026-04-06-vector-search-review.md
    - 2026-04-19 LanceDB Vector Migration: engineering-notes/2026-04-19-lancedb-vector-migration.md
  - Operations: operations.md
  - Tox & Dependency Matrix: tox-and-dependency-matrix.md
  - Cloud Testing: cloud-testing.md
  - Release Process: release.md
  - Glossary: glossary.md
  - API Reference: api.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
