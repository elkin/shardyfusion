site_name: shardyfusion
site_description: Sharded SlateDB snapshot writer and reader helpers for PySpark
site_url: https://slatedb.github.io/shardyfusion/
repo_url: https://github.com/slatedb/shardyfusion
repo_name: slatedb/shardyfusion

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            show_source: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Writer Side: writer.md
  - Reader Side: reader.md
  - CLI (slate-reader): cli.md
  - Architecture: how-it-works.md
  - Operations: operations.md
  - Release Process: release.md
  - API Reference: api.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
