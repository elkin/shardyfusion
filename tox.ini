[tox]
min_version = 4.11
env_list = py{310,311}-all-spark{35,4}-unit, py{310,311}-read-unit, py{310,311}-writer-spark4-unit
skip_missing_interpreters = true

[testenv]
description = Run flavor-specific test suites against pinned Python/PySpark versions
package = editable
extras =
    test
    read: read
    writer: writer
    all: all
deps =
    writer-spark35: pyspark>=3.5,<3.6
    writer-spark4: pyspark>=4,<5
    all-spark35: pyspark>=3.5,<3.6
    all-spark4: pyspark>=4,<5
commands =
    read-unit: python -m pytest -q -n 2 tests/unit/test_config.py tests/unit/test_manifest.py tests/unit/test_manifest_readers.py tests/unit/test_publish.py tests/unit/test_reader.py {posargs}
    read-integration: python -m pytest -q tests/integration/test_reader_integration.py tests/integration/test_reader_local_s3.py {posargs}
    writer-unit: python -m pytest -q -n 2 tests/unit/test_config.py tests/unit/test_manifest.py tests/unit/test_publish.py tests/unit/test_routing.py tests/unit/test_sharding.py tests/unit/test_winner_selection.py tests/unit/test_writer_spark_conf.py {posargs}
    writer-integration: python -m pytest -q tests/integration/test_write_flow.py tests/integration/test_pyspark_shard_contract.py tests/integration/test_writer_local_s3.py tests/integration/test_writer_reader_local_s3_refresh.py {posargs}
    all-unit: python -m pytest -q -n 2 tests/unit {posargs}
    all-integration: python -m pytest -q tests/integration {posargs}
set_env =
    PYTHONPATH = {toxinidir}
    SPARK_LOCAL_IP = 127.0.0.1
