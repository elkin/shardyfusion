[tox]
min_version = 4.11
env_list =
    lint, format, type, type-fallback, package, docs-check,
    typecheck-read, typecheck-pythonwriter, typecheck-daskwriter, typecheck-sparkwriter,
    py311-all-spark{35,4}-unit, py311-read-unit,
    py311-sparkwriter-spark{35,4}-unit,
    py{312,313,314}-all-spark4-unit, py{312,313,314}-read-unit,
    py{312,313,314}-sparkwriter-spark4-unit,
    py{311,312,313,314}-daskwriter-unit,
    py{311,312,313,314}-pythonwriter-unit,
    py311-read-e2e, py311-all-spark{35,4}-e2e,
    py{312,313,314}-read-e2e, py{312,313,314}-all-spark4-e2e
skip_missing_interpreters = false
labels =
    quality = lint, format, type, type-fallback, package, docs-check, typecheck-read, typecheck-pythonwriter, typecheck-daskwriter, typecheck-sparkwriter
    unit = py311-all-spark{35,4}-unit, py311-read-unit, py311-sparkwriter-spark{35,4}-unit, py{312,313,314}-all-spark4-unit, py{312,313,314}-read-unit, py{312,313,314}-sparkwriter-spark4-unit, py{311,312,313,314}-daskwriter-unit, py{311,312,313,314}-pythonwriter-unit
    integration = py311-read-integration, py311-sparkwriter-spark{35,4}-integration, py{312,313,314}-read-integration, py{312,313,314}-sparkwriter-spark4-integration, py311-daskwriter-integration, py311-pythonwriter-integration
    e2e = py311-read-e2e, py311-all-spark{35,4}-e2e, py{312,313,314}-read-e2e, py{312,313,314}-all-spark4-e2e

[testenv]
description = Run flavor-specific test suites against pinned Python/PySpark versions
package = editable
allowlist_externals =
    uv
extras =
    test
    lint: quality
    format: quality
    type: quality
    type: all
    type: cli
    typecheck: quality
    read: read
    sparkwriter: writer-spark
    pythonwriter: writer-python
    daskwriter: writer-dask
    all: all
    docs-check: docs
deps =
    sparkwriter-spark35: pyspark>=3.5,<3.6
    sparkwriter-spark4: pyspark>=4,<5
    all-spark35: pyspark>=3.5,<3.6
    all-spark4: pyspark>=4,<5
commands =
    lint: python -m ruff check .
    format: python -m ruff format --check .
    type: python -m ty check slatedb_spark_sharded --python-version 3.11 --error-on-warning
    type-fallback: python -m pyright slatedb_spark_sharded
    typecheck-read: python -m ty check slatedb_spark_sharded --python-version 3.11 --error-on-warning --exclude "slatedb_spark_sharded/writer/spark/**" --exclude "slatedb_spark_sharded/writer/dask/**" --exclude "slatedb_spark_sharded/cli/**"
    typecheck-pythonwriter: python -m ty check slatedb_spark_sharded --python-version 3.11 --error-on-warning --exclude "slatedb_spark_sharded/writer/spark/**" --exclude "slatedb_spark_sharded/writer/dask/**" --exclude "slatedb_spark_sharded/cli/**"
    typecheck-daskwriter: python -m ty check slatedb_spark_sharded --python-version 3.11 --error-on-warning --exclude "slatedb_spark_sharded/writer/spark/**" --exclude "slatedb_spark_sharded/cli/**"
    typecheck-sparkwriter: python -m ty check slatedb_spark_sharded --python-version 3.11 --error-on-warning --exclude "slatedb_spark_sharded/writer/dask/**" --exclude "slatedb_spark_sharded/writer/python/**" --exclude "slatedb_spark_sharded/cli/**"
    package: uv build
    docs-check: python -m mkdocs build --strict
    read-unit: python -m pytest -q -n 2 tests/unit/shared tests/unit/read {posargs}
    read-integration: python -m pytest -q tests/integration/read {posargs}
    sparkwriter-unit: python -m pytest -q -n 2 tests/unit/shared tests/unit/writer --ignore=tests/unit/writer/dask --ignore=tests/unit/writer/python {posargs}
    sparkwriter-integration: python -m pytest -q tests/integration/writer/spark {posargs}
    pythonwriter-unit: python -m pytest -q -n 2 tests/unit/shared tests/unit/writer --ignore=tests/unit/writer/spark --ignore=tests/unit/writer/dask -m "not spark" {posargs}
    pythonwriter-integration: python -m pytest -q tests/integration/writer/python {posargs}
    all-unit: python -m pytest -q -n 2 tests/unit {posargs}
    daskwriter-unit: python -m pytest -q -n 2 tests/unit/shared tests/unit/writer --ignore=tests/unit/writer/spark --ignore=tests/unit/writer/python -m "not spark" {posargs}
    daskwriter-integration: python -m pytest -q tests/integration/writer/dask {posargs}
    read-e2e: python -m pytest -q tests/e2e/read {posargs}
    all-e2e: python -m pytest -q tests/e2e {posargs}

pass_env =
    e2e: GARAGE_E2E_ENDPOINT
    e2e: GARAGE_E2E_ADMIN_URL
    e2e: GARAGE_E2E_ADMIN_TOKEN
set_env =
    SPARK_LOCAL_IP = 127.0.0.1
