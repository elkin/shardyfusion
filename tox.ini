[tox]
min_version = 4.11
env_list = spark35, spark4

[testenv]
description = Run integration tests against pinned PySpark versions
package = skip
deps =
    pytest>=7.4
    boto3>=1.28
commands =
    python -m pytest -q tests/integration -m spark {posargs}
set_env =
    PYTHONPATH = {toxinidir}
    SPARK_LOCAL_IP = 127.0.0.1

[testenv:spark35]
deps =
    {[testenv]deps}
    pyspark>=3.5,<3.6

[testenv:spark4]
deps =
    {[testenv]deps}
    pyspark>=4,<5
