[tox]
min_version = 4.11
env_list = spark35, spark4

[testenv]
description = Run full test suite against pinned PySpark versions
package = editable
extras =
    all
    test
deps =
commands =
    python -m pytest -q {posargs}
set_env =
    PYTHONPATH = {toxinidir}
    SPARK_LOCAL_IP = 127.0.0.1

[testenv:spark35]
deps =
    {[testenv]deps}
    pyspark>=3.5,<3.6

[testenv:spark4]
deps =
    {[testenv]deps}
    pyspark>=4,<5
