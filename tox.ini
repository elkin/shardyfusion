[tox]
min_version = 4.11
env_list =
    lint,
    format,
    type-all,
    type-read,
    type-readasync,
    type-pythonwriter,
    type-daskwriter,
    type-raywriter,
    type-sparkwriter,
    type-sqlite,
    package,
    docs-check,
    py{311,312,313,314}-core-unit,
    py{311,312,313,314}-read-slatedb-unit,
    py{311,312,313,314}-readasync-slatedb-unit,
    py{311,312,313,314}-pythonwriter-slatedb-unit,
    py311-sparkwriter-spark35-slatedb-unit,
    py{311,312,313,314}-sparkwriter-spark4-slatedb-unit,
    py{311,312,313}-daskwriter-slatedb-unit,
    py{311,312,313}-raywriter-slatedb-unit,
    py{311,312,313,314}-backendsqlite-unit,
    py311-read-sqliterange-unit,
    py311-pythonwriter-sqlite-unit,
    py311-sparkwriter-spark4-sqlite-unit,
    py311-daskwriter-sqlite-unit,
    py311-raywriter-sqlite-unit,
    py311-cli-unit,
    py311-prometheus-unit,
    py311-otel-unit,
    py{311,312,313,314}-read-slatedb-integration,
    py{311,312,313,314}-pythonwriter-slatedb-integration,
    py311-sparkwriter-spark35-slatedb-integration,
    py{311,312,313,314}-sparkwriter-spark4-slatedb-integration,
    py{311,312,313}-daskwriter-slatedb-integration,
    py{311,312,313}-raywriter-slatedb-integration,
    py{311,312,313,314}-backendsqlite-integration,
    py311-all-spark35-unit,
    py311-all-spark35-integration,
    py{311,312,313,314}-read-e2e,
    py311-sparkwriter-spark35-e2e,
    py{311,312,313,314}-sparkwriter-spark4-e2e,
    py{311,312,313,314}-pythonwriter-e2e,
    py{311,312,313}-daskwriter-e2e,
    py{311,312,313}-raywriter-e2e
skip_missing_interpreters = false
labels =
    quality = lint, format, type-all, type-read, type-readasync, type-pythonwriter, type-daskwriter, type-raywriter, type-sparkwriter, type-sqlite, package, docs-check
    unit = py{311,312,313,314}-core-unit, py{311,312,313,314}-read-slatedb-unit, py{311,312,313,314}-readasync-slatedb-unit, py{311,312,313,314}-pythonwriter-slatedb-unit, py311-sparkwriter-spark35-slatedb-unit, py{311,312,313,314}-sparkwriter-spark4-slatedb-unit, py{311,312,313}-daskwriter-slatedb-unit, py{311,312,313}-raywriter-slatedb-unit, py{311,312,313,314}-backendsqlite-unit, py311-read-sqliterange-unit, py311-pythonwriter-sqlite-unit, py311-sparkwriter-spark4-sqlite-unit, py311-daskwriter-sqlite-unit, py311-raywriter-sqlite-unit, py311-cli-unit, py311-prometheus-unit, py311-otel-unit
    integration = py{311,312,313,314}-read-slatedb-integration, py{311,312,313,314}-pythonwriter-slatedb-integration, py311-sparkwriter-spark35-slatedb-integration, py{311,312,313,314}-sparkwriter-spark4-slatedb-integration, py{311,312,313}-daskwriter-slatedb-integration, py{311,312,313}-raywriter-slatedb-integration, py{311,312,313,314}-backendsqlite-integration
    smoke = py311-all-spark35-unit, py311-all-spark35-integration
    e2e = py{311,312,313,314}-read-e2e, py311-sparkwriter-spark35-e2e, py{311,312,313,314}-sparkwriter-spark4-e2e, py{311,312,313,314}-pythonwriter-e2e, py{311,312,313}-daskwriter-e2e, py{311,312,313}-raywriter-e2e

[testenv]
description = Run capability- and backend-specific test suites
package = editable
extras =
    unit,integration,e2e: test
    lint,format,type: quality
    docs-check: docs
    all: all
allowlist_externals =
    uv
dependency_groups =
    read,readasync: cap-read
    readasync: cap-read-async
    pythonwriter: cap-writer-python
    sparkwriter: cap-writer-spark
    daskwriter: cap-writer-dask
    raywriter: cap-writer-ray
    cli: cap-cli
    slatedb: backend-slatedb
    sqlite: backend-sqlite
    backendsqlite: backend-sqlite-range
    sqliterange: backend-sqlite-range
    prometheus: mod-metrics-prometheus
    otel: mod-metrics-otel
    e2e: backend-slatedb
deps =
    sparkwriter-spark35,all-spark35: pyspark>=3.5,<3.6
    sparkwriter-spark4: pyspark>=4,<5
commands =
    lint: python -m ruff check .
    format: python -m ruff format --check .
    type-all: python -m pyright shardyfusion
    type-read: python -m pyright -p pyright/read.json
    type-readasync: python -m pyright -p pyright/read-async.json
    type-pythonwriter: python -m pyright -p pyright/pythonwriter.json
    type-daskwriter: python -m pyright -p pyright/daskwriter.json
    type-raywriter: python -m pyright -p pyright/raywriter.json
    type-sparkwriter: python -m pyright -p pyright/sparkwriter.json
    type-sqlite: python -m pyright -p pyright/sqlite.json
    package: uv build
    docs-check: python -m mkdocs build --strict
    core-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/shared tests/unit/writer/test_cleanup_core.py tests/unit/writer/test_routing_contract.py tests/unit/writer/test_serde.py tests/unit/writer/test_synthesize_empty_shards.py tests/unit/writer/test_winner_selection.py tests/unit/writer/test_writer_core_resilience.py {posargs}
    read-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/read {posargs}
    readasync-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/read_async {posargs}
    pythonwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/writer/python -m "not cel" {posargs}
    sparkwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/writer/spark {posargs}
    daskwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/writer/dask {posargs}
    raywriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/writer/ray {posargs}
    backendsqlite-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/backend/sqlite {posargs}
    sqliterange-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/backend/sqlite/test_sqlite_range_reader.py {posargs}
    cli-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/cli {posargs}
    prometheus-unit: python -m pytest -q tests/unit/metrics/test_prometheus.py {posargs}
    otel-unit: python -m pytest -q tests/unit/metrics/test_otel.py {posargs}
    all-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit {posargs}
    read-integration: python -m pytest -q tests/integration/read {posargs}
    pythonwriter-integration: python -m pytest -q tests/integration/writer/python -m "not cel" {posargs}
    sparkwriter-integration: python -m pytest -q tests/integration/writer/spark -m "not cel" {posargs}
    daskwriter-integration: python -m pytest -q tests/integration/writer/dask -m "not cel" {posargs}
    raywriter-integration: python -m pytest -q tests/integration/writer/ray -m "not cel" {posargs}
    backendsqlite-integration: python -m pytest -q tests/integration/backend/sqlite {posargs}
    all-integration: python -m pytest -q tests/integration {posargs}
    read-e2e: python -m pytest -q tests/e2e/read -m "not cel" {posargs}
    pythonwriter-e2e: python -m pytest -q tests/e2e/writer/python -m "not cel" {posargs}
    sparkwriter-e2e: python -m pytest -q tests/e2e/writer/spark -m "not cel" {posargs}
    daskwriter-e2e: python -m pytest -q tests/e2e/writer/dask -m "not cel" {posargs}
    raywriter-e2e: python -m pytest -q tests/e2e/writer/ray -m "not cel" {posargs}
pass_env =
    PYTEST_WORKERS
    PYTEST_ADDOPTS
    e2e: GARAGE_E2E_ENDPOINT
    e2e: GARAGE_E2E_ADMIN_URL
    e2e: GARAGE_E2E_ADMIN_TOKEN
set_env =
    SPARK_LOCAL_IP = 127.0.0.1
    raywriter,all: RAY_ENABLE_UV_RUN_RUNTIME_ENV = 0

[testenv:type-all]
basepython = python3.13

[testenv:type-read]
dependency_groups =
    cap-read
    backend-slatedb

[testenv:type-readasync]
dependency_groups =
    cap-read
    cap-read-async
    backend-slatedb

[testenv:type-pythonwriter]
dependency_groups =
    cap-writer-python
    backend-slatedb

[testenv:type-daskwriter]
basepython = python3.13
dependency_groups =
    cap-writer-dask
    backend-slatedb

[testenv:type-raywriter]
basepython = python3.13
dependency_groups =
    cap-writer-ray
    backend-slatedb

[testenv:type-sparkwriter]
dependency_groups =
    cap-writer-spark
    backend-slatedb

[testenv:type-sqlite]
dependency_groups =
    backend-sqlite-range

[testenv:py311-cli-unit]
dependency_groups =
    cap-cli
    cap-read
    backend-slatedb
