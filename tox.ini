[tox]
min_version = 4.11
requires = tox-uv>=1.0
env_list =
    lint,
    format,
    type-all,
    type-read,
    type-readasync,
    type-pythonwriter,
    type-daskwriter,
    type-raywriter,
    type-sparkwriter,
    type-sqlite,
    package,
    docs-check,
    py{311,312,313}-core-unit,
    py{311,312,313}-read-slatedb-unit,
    py{311,312,313}-readasync-slatedb-unit,
    py{311,312,313}-pythonwriter-slatedb-unit,
    py311-sparkwriter-spark35-slatedb-unit,
    py{311,312,313}-sparkwriter-spark4-slatedb-unit,
    py{311,312,313}-daskwriter-slatedb-unit,
    py{311,312,313}-raywriter-slatedb-unit,
    py{311,312,313}-backend-sqlite-unit,
    py311-read-sqliterange-unit,
    py311-pythonwriter-sqlite-unit,
    py311-sparkwriter-spark4-sqlite-unit,
    py311-daskwriter-sqlite-unit,
    py311-raywriter-sqlite-unit,
    py311-cli-unit,
    py311-prometheus-unit,
    py311-otel-unit,
    py{311,312,313}-vector-sqlite-unit,
    py{311,312,313}-vector-lancedb-unit,
    py{311,312,313}-vector-integration,
    py{311,312,313}-read-slatedb-integration,
    py{311,312,313}-pythonwriter-slatedb-integration,
    py311-sparkwriter-spark35-slatedb-integration,
    py{311,312,313}-sparkwriter-spark4-slatedb-integration,
    py{311,312,313}-daskwriter-slatedb-integration,
    py{311,312,313}-raywriter-slatedb-integration,
    py{311,312,313}-backend-sqlite-integration,
    py311-all-spark35-unit,
    py311-all-spark35-integration,
    py{311,312,313}-read-e2e,
    py311-sparkwriter-spark35-e2e,
    py{311,312,313}-sparkwriter-spark4-e2e,
    py{311,312,313}-pythonwriter-e2e,
    py{311,312,313}-daskwriter-e2e,
    py{311,312,313}-raywriter-e2e,
    py{311,312,313}-cli-e2e
skip_missing_interpreters = false
labels =
    quality = lint, format, type-all, type-read, type-readasync, type-pythonwriter, type-daskwriter, type-raywriter, type-sparkwriter, type-sqlite, package, docs-check
    unit = py{311,312,313}-core-unit, py{311,312,313}-read-slatedb-unit, py{311,312,313}-readasync-slatedb-unit, py{311,312,313}-pythonwriter-slatedb-unit, py311-sparkwriter-spark35-slatedb-unit, py{311,312,313}-sparkwriter-spark4-slatedb-unit, py{311,312,313}-daskwriter-slatedb-unit, py{311,312,313}-raywriter-slatedb-unit, py{311,312,313}-backend-sqlite-unit, py311-read-sqliterange-unit, py311-pythonwriter-sqlite-unit, py311-sparkwriter-spark4-sqlite-unit, py311-daskwriter-sqlite-unit, py311-raywriter-sqlite-unit, py311-cli-unit, py311-prometheus-unit, py311-otel-unit, py{311,312,313}-vector-sqlite-unit, py{311,312,313}-vector-lancedb-unit
    integration = py{311,312,313}-vector-integration, py{311,312,313}-read-slatedb-integration, py{311,312,313}-pythonwriter-slatedb-integration, py311-sparkwriter-spark35-slatedb-integration, py{311,312,313}-sparkwriter-spark4-slatedb-integration, py{311,312,313}-daskwriter-slatedb-integration, py{311,312,313}-raywriter-slatedb-integration, py{311,312,313}-backend-sqlite-integration
    smoke = py311-all-spark35-unit, py311-all-spark35-integration
    e2e = py{311,312,313}-read-e2e, py311-sparkwriter-spark35-e2e, py{311,312,313}-sparkwriter-spark4-e2e, py{311,312,313}-pythonwriter-e2e, py{311,312,313}-daskwriter-e2e, py{311,312,313}-raywriter-e2e, py{311,312,313}-cli-e2e

[testenv]
description = Run capability- and backend-specific test suites
runner = uv-venv-runner
package = editable
extras =
    unit,integration,e2e: test
    lint,format,type: quality
    docs-check: docs
    all: all
allowlist_externals =
    uv
dependency_groups =
    readasync: cap-read-async
    sparkwriter: cap-writer-spark
    daskwriter: cap-writer-dask
    raywriter: cap-writer-ray
    cli,cli-e2e: cap-cli
    slatedb: backend-slatedb
    pythonwriter-sqlite,sparkwriter-sqlite,daskwriter-sqlite,raywriter-sqlite: backend-sqlite
    backend-sqlite,sqliterange: backend-sqlite-range
    prometheus: mod-metrics-prometheus
    otel: mod-metrics-otel
    core,vector,pythonwriter,sparkwriter,daskwriter,raywriter,all,e2e: mod-cel
    e2e: backend-slatedb
    e2e: backend-sqlite
    e2e: backend-sqlite-range
    e2e: backend-sqlite-vec
    vector-sqlite: backend-sqlite-vec
    vector-lancedb: backend-vector-lancedb
    vector-integration: backend-sqlite-vec
    vector-integration: backend-vector-lancedb
    e2e: backend-vector-lancedb
deps =
    sparkwriter-spark35,all-spark35: pyspark>=3.5,<3.6
    sparkwriter-spark4: pyspark>=4,<5
commands =
    lint: python -m ruff check .
    format: python -m ruff format --check .
    type-all: python -m pyright shardyfusion
    type-read: python -m pyright -p pyright/read.json
    type-readasync: python -m pyright -p pyright/read-async.json
    type-pythonwriter: python -m pyright -p pyright/pythonwriter.json
    type-daskwriter: python -m pyright -p pyright/daskwriter.json
    type-raywriter: python -m pyright -p pyright/raywriter.json
    type-sparkwriter: python -m pyright -p pyright/sparkwriter.json
    type-sqlite: python -m pyright -p pyright/sqlite.json
    package: uv build
    docs-check: python -m mkdocs build --strict
    core-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/shared tests/unit/cel tests/unit/writer/core tests/unit/vector} --ignore=tests/unit/vector/test_lancedb_adapter.py --ignore=tests/unit/vector/test_sqlite_vec_adapter.py
    read-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/read}
    readasync-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/read_async}
    pythonwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/writer/python}
    sparkwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/writer/spark}
    daskwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/writer/dask}
    raywriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/writer/ray}
    backend-sqlite-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/backend/sqlite}
    sqliterange-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/backend/sqlite/test_sqlite_range_reader.py}
    cli-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/cli}
    prometheus-unit: python -m pytest -q {posargs:tests/unit/metrics/test_prometheus.py}
    otel-unit: python -m pytest -q {posargs:tests/unit/metrics/test_otel.py}
    all-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit}
    vector-sqlite-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/vector} --ignore=tests/unit/vector/test_lancedb_adapter.py
    vector-lancedb-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/unit/vector} --ignore=tests/unit/vector/test_sqlite_vec_adapter.py
    vector-integration: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/integration/vector} --ignore=tests/integration/vector/test_distributed_unified_writers_local_s3.py
    read-integration: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/integration/read}
    pythonwriter-integration: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/integration/writer/python}
    sparkwriter-integration: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/integration/writer/spark}
    daskwriter-integration: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/integration/writer/dask}
    raywriter-integration: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/integration/writer/ray}
    backend-sqlite-integration: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/integration/backend/sqlite}
    all-integration: python -m pytest -q -n {env:PYTEST_WORKERS:2} {posargs:tests/integration}
    read-e2e: python -m pytest -q {posargs:tests/e2e/read}
    pythonwriter-e2e: python -m pytest -q {posargs:tests/e2e/writer/python}
    sparkwriter-e2e: python -m pytest -q {posargs:tests/e2e/writer/spark}
    daskwriter-e2e: python -m pytest -q {posargs:tests/e2e/writer/dask}
    raywriter-e2e: python -m pytest -q {posargs:tests/e2e/writer/ray}
    cli-e2e: python -m pytest -q {posargs:tests/e2e/cli}

pass_env =
    PYTEST_WORKERS
    PYTEST_ADDOPTS
    e2e: GARAGE_E2E_ENDPOINT
    e2e: GARAGE_E2E_ADMIN_URL
    e2e: GARAGE_E2E_ADMIN_TOKEN
set_env =
    SPARK_LOCAL_IP = 127.0.0.1
    raywriter,all: RAY_ENABLE_UV_RUN_RUNTIME_ENV = 0

[testenv:type-all]
basepython = python3.13

[testenv:type-read]
dependency_groups =
    backend-slatedb

[testenv:type-readasync]
dependency_groups =
    cap-read-async
    backend-slatedb

[testenv:type-pythonwriter]
dependency_groups =
    backend-slatedb

[testenv:type-daskwriter]
basepython = python3.13
dependency_groups =
    cap-writer-dask
    backend-slatedb

[testenv:type-raywriter]
basepython = python3.13
dependency_groups =
    cap-writer-ray
    backend-slatedb

[testenv:type-sparkwriter]
dependency_groups =
    cap-writer-spark
    backend-slatedb

[testenv:type-sqlite]
dependency_groups =
    backend-sqlite-range

[testenv:py311-cli-unit]
dependency_groups =
    cap-cli
    backend-slatedb

# Ray e2e environments must run sequentially — they compete for
# /tmp/ray/ session dirs, ports, and /dev/shm inside the container.
# This only affects the `e2e` label (used by `just d-e2e`), not
# `just ci` which runs quality/unit/integration labels.
[testenv:py312-raywriter-e2e]
depends = py311-raywriter-e2e

[testenv:py313-raywriter-e2e]
depends = py312-raywriter-e2e

# Spark e2e environments must run sequentially — multiple JVMs compete
# for memory inside the container.
[testenv:py311-sparkwriter-spark4-e2e]
depends = py311-sparkwriter-spark35-e2e

[testenv:py312-sparkwriter-spark4-e2e]
depends = py311-sparkwriter-spark4-e2e

[testenv:py313-sparkwriter-spark4-e2e]
depends = py312-sparkwriter-spark4-e2e
