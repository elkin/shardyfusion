[tox]
min_version = 4.11
env_list = lint, format, type, type-fallback, package, docs-check, py311-all-spark{35,4}-unit, py311-read-unit, py311-writer-spark{35,4}-unit, py{312,313,314}-all-spark4-unit, py{312,313,314}-read-unit, py{312,313,314}-writer-spark4-unit, py311-read-e2e, py311-all-spark{35,4}-e2e
skip_missing_interpreters = false
labels =
    quality = lint, format, type, type-fallback, package, docs-check
    unit = py311-all-spark{35,4}-unit, py311-read-unit, py311-writer-spark{35,4}-unit, py{312,313,314}-all-spark4-unit, py{312,313,314}-read-unit, py{312,313,314}-writer-spark4-unit
    integration = py311-read-integration, py311-writer-spark{35,4}-integration, py{312,313,314}-read-integration, py{312,313,314}-writer-spark4-integration
    e2e = py311-read-e2e, py311-all-spark{35,4}-e2e

[testenv]
description = Run flavor-specific test suites against pinned Python/PySpark versions
package = editable
allowlist_externals =
    uv
extras =
    test
    lint: quality
    format: quality
    type: quality
    type: all
    type: cli
    read: read
    writer: writer
    all: all
    docs-check: docs
deps =
    writer-spark35: pyspark>=3.5,<3.6
    writer-spark4: pyspark>=4,<5
    all-spark35: pyspark>=3.5,<3.6
    all-spark4: pyspark>=4,<5
commands =
    lint: python -m ruff check .
    format: python -m ruff format --check .
    type: python -m ty check slatedb_spark_sharded --python-version 3.11 --error-on-warning
    type-fallback: python -m pyright slatedb_spark_sharded
    package: uv build
    docs-check: python -m mkdocs build --strict
    read-unit: python -m pytest -q -n 2 tests/unit/shared tests/unit/read {posargs}
    read-integration: python -m pytest -q tests/integration/read {posargs}
    writer-unit: python -m pytest -q -n 2 tests/unit/shared tests/unit/writer {posargs}
    writer-integration: python -m pytest -q tests/integration/writer {posargs}
    all-unit: python -m pytest -q -n 2 tests/unit {posargs}
    read-e2e: python -m pytest -q tests/e2e/read {posargs}
    all-e2e: python -m pytest -q tests/e2e {posargs}

pass_env =
    e2e: GARAGE_E2E_ENDPOINT
    e2e: GARAGE_E2E_ADMIN_URL
    e2e: GARAGE_E2E_ADMIN_TOKEN
set_env =
    SPARK_LOCAL_IP = 127.0.0.1
