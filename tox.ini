[tox]
min_version = 4.11
env_list =
    lint, format, type-all, package, docs-check,
    type-read, type-read-async, type-pythonwriter, type-daskwriter, type-raywriter, type-sparkwriter,
    py311-all-spark35-unit,
    py311-sparkwriter-spark35-unit,
    py{311,312,313}-all-spark4-unit, py{311,312,313,314}-read-unit,
    py{311,312,313,314}-sparkwriter-spark4-unit,
    py{311,312,313}-daskwriter-unit,
    py{311,312,313}-raywriter-unit,
    py{311,312,313,314}-pythonwriter-unit,
    py{311,312,313,314}-prometheus-unit,
    py{311,312,313,314}-otel-unit
skip_missing_interpreters = false
labels =
    quality = lint, format, type-all, package, docs-check, type-read, type-read-async, type-pythonwriter, type-daskwriter, type-raywriter, type-sparkwriter
    unit = py311-all-spark35-unit, py311-sparkwriter-spark35-unit, py{311,312,313}-all-spark4-unit, py{311,312,313,314}-read-unit, py{311,312,313,314}-sparkwriter-spark4-unit, py{311,312,313}-daskwriter-unit, py{311,312,313}-raywriter-unit, py{311,312,313,314}-pythonwriter-unit, py{311,312,313,314}-prometheus-unit, py{311,312,313,314}-otel-unit
    integration = py311-sparkwriter-spark35-integration, py{311,312,313,314}-read-integration, py{311,312,313,314}-sparkwriter-spark4-integration, py{311,312,313}-daskwriter-integration, py{311,312,313}-raywriter-integration, py{311,312,313,314}-pythonwriter-integration
    e2e = py{311,312,313,314}-read-e2e, py311-sparkwriter-spark35-e2e, py{311,312,313,314}-sparkwriter-spark4-e2e, py{311,312,313,314}-pythonwriter-e2e, py{311,312,313}-daskwriter-e2e, py{311,312,313}-raywriter-e2e

[testenv]
description = Run flavor-specific test suites against pinned Python/PySpark versions
package = editable
allowlist_externals =
    uv
extras =
    test
    lint: quality
    format: quality
    type: quality
    read: read
    async: read-async
    sparkwriter: writer-spark
    pythonwriter: writer-python
    daskwriter: writer-dask
    raywriter: writer-ray
    prometheus: metrics-prometheus
    otel: metrics-otel
    all: all
    docs-check: docs
deps =
    sparkwriter-spark35: pyspark>=3.5,<3.6
    sparkwriter-spark4: pyspark>=4,<5
    all-spark35: pyspark>=3.5,<3.6
    all-spark4: pyspark>=4,<5
commands =
    lint: python -m ruff check .
    format: python -m ruff format --check .
    type-all: python -m pyright shardyfusion
    type-read: python -m pyright -p pyright/read.json
    type-read-async: python -m pyright -p pyright/read-async.json
    type-pythonwriter: python -m pyright -p pyright/pythonwriter.json
    type-daskwriter: python -m pyright -p pyright/daskwriter.json
    type-raywriter: python -m pyright -p pyright/raywriter.json
    type-sparkwriter: python -m pyright -p pyright/sparkwriter.json
    package: uv build
    docs-check: python -m mkdocs build --strict
    read-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/shared tests/unit/read {posargs}
    read-integration: python -m pytest -q tests/integration/read {posargs}
    sparkwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/shared tests/unit/writer --ignore=tests/unit/writer/dask --ignore=tests/unit/writer/python --ignore=tests/unit/writer/ray {posargs}
    sparkwriter-integration: python -m pytest -q tests/integration/writer/spark {posargs}
    pythonwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/shared tests/unit/writer --ignore=tests/unit/writer/spark --ignore=tests/unit/writer/dask --ignore=tests/unit/writer/ray {posargs}
    pythonwriter-integration: python -m pytest -q tests/integration/writer/python {posargs}
    prometheus-unit: python -m pytest -q tests/unit/metrics/test_prometheus.py {posargs}
    otel-unit: python -m pytest -q tests/unit/metrics/test_otel.py {posargs}
    all-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit {posargs}
    daskwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/shared tests/unit/writer --ignore=tests/unit/writer/spark --ignore=tests/unit/writer/python --ignore=tests/unit/writer/ray {posargs}
    daskwriter-integration: python -m pytest -q tests/integration/writer/dask {posargs}
    raywriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/shared tests/unit/writer --ignore=tests/unit/writer/spark --ignore=tests/unit/writer/python --ignore=tests/unit/writer/dask {posargs}
    raywriter-integration: python -m pytest -q tests/integration/writer/ray {posargs}
    read-e2e: python -m pytest -q tests/e2e/read {posargs}
    sparkwriter-e2e: python -m pytest -q tests/e2e/writer/spark {posargs}
    pythonwriter-e2e: python -m pytest -q tests/e2e/writer/python {posargs}
    daskwriter-e2e: python -m pytest -q tests/e2e/writer/dask {posargs}
    raywriter-e2e: python -m pytest -q tests/e2e/writer/ray {posargs}
    all-e2e: python -m pytest -q tests/e2e {posargs}

pass_env =
    PYTEST_WORKERS
    PYTEST_ADDOPTS
    e2e: GARAGE_E2E_ENDPOINT
    e2e: GARAGE_E2E_ADMIN_URL
    e2e: GARAGE_E2E_ADMIN_TOKEN
set_env =
    SPARK_LOCAL_IP = 127.0.0.1
    raywriter,all: RAY_ENABLE_UV_RUN_RUNTIME_ENV = 0

# Dask and Ray don't support Python 3.14 yet, so type-checking envs that
# install those extras must use Python 3.13.
[testenv:type-all]
basepython = python3.13

[testenv:type-daskwriter]
basepython = python3.13

[testenv:type-raywriter]
basepython = python3.13
