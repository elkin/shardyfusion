[tox]
min_version = 4.11
env_list =
    lint, format, type-all, package, docs-check,
    type-read, type-pythonwriter, type-daskwriter, type-sparkwriter,
    py311-all-spark35-unit,
    py311-sparkwriter-spark35-unit,
    py{311,312,313,314}-all-spark4-unit, py{311,312,313,314}-read-unit,
    py{311,312,313,314}-sparkwriter-spark4-unit,
    py{311,312,313}-daskwriter-unit,
    py{311,312,313,314}-pythonwriter-unit
skip_missing_interpreters = false
labels =
    quality = lint, format, type-all, package, docs-check, type-read, type-pythonwriter, type-daskwriter, type-sparkwriter
    unit = py311-all-spark35-unit, py311-sparkwriter-spark35-unit, py{311,312,313,314}-all-spark4-unit, py{311,312,313,314}-read-unit, py{311,312,313,314}-sparkwriter-spark4-unit, py{311,312,313}-daskwriter-unit, py{311,312,313,314}-pythonwriter-unit
    integration = py311-sparkwriter-spark35-integration, py{311,312,313,314}-read-integration, py{311,312,313,314}-sparkwriter-spark4-integration, py{311,312,313}-daskwriter-integration, py{311,312,313,314}-pythonwriter-integration
    e2e = py{311,312,313,314}-read-e2e, py311-sparkwriter-spark35-e2e, py{311,312,313,314}-sparkwriter-spark4-e2e, py{311,312,313,314}-pythonwriter-e2e, py{311,312,313}-daskwriter-e2e

[testenv]
description = Run flavor-specific test suites against pinned Python/PySpark versions
package = editable
allowlist_externals =
    uv
extras =
    test
    lint: quality
    format: quality
    type: quality
    read: read
    sparkwriter: writer-spark
    pythonwriter: writer-python
    daskwriter: writer-dask
    all: all
    docs-check: docs
deps =
    sparkwriter-spark35: pyspark>=3.5,<3.6
    sparkwriter-spark4: pyspark>=4,<5
    all-spark35: pyspark>=3.5,<3.6
    all-spark4: pyspark>=4,<5
commands =
    lint: python -m ruff check .
    format: python -m ruff format --check .
    type-all: python -m pyright slatedb_spark_sharded
    type-read: python -m pyright -p pyright/read.json
    type-pythonwriter: python -m pyright -p pyright/pythonwriter.json
    type-daskwriter: python -m pyright -p pyright/daskwriter.json
    type-sparkwriter: python -m pyright -p pyright/sparkwriter.json
    package: uv build
    docs-check: python -m mkdocs build --strict
    read-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/shared tests/unit/read {posargs}
    read-integration: python -m pytest -q tests/integration/read {posargs}
    sparkwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/shared tests/unit/writer --ignore=tests/unit/writer/dask --ignore=tests/unit/writer/python {posargs}
    sparkwriter-integration: python -m pytest -q tests/integration/writer/spark {posargs}
    pythonwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/shared tests/unit/writer --ignore=tests/unit/writer/spark --ignore=tests/unit/writer/dask {posargs}
    pythonwriter-integration: python -m pytest -q tests/integration/writer/python {posargs}
    all-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit {posargs}
    daskwriter-unit: python -m pytest -q -n {env:PYTEST_WORKERS:2} tests/unit/shared tests/unit/writer --ignore=tests/unit/writer/spark --ignore=tests/unit/writer/python {posargs}
    daskwriter-integration: python -m pytest -q tests/integration/writer/dask {posargs}
    read-e2e: python -m pytest -q tests/e2e/read {posargs}
    sparkwriter-e2e: python -m pytest -q tests/e2e/writer/spark {posargs}
    pythonwriter-e2e: python -m pytest -q tests/e2e/writer/python {posargs}
    daskwriter-e2e: python -m pytest -q tests/e2e/writer/dask {posargs}
    all-e2e: python -m pytest -q tests/e2e {posargs}

pass_env =
    PYTEST_WORKERS
    e2e: GARAGE_E2E_ENDPOINT
    e2e: GARAGE_E2E_ADMIN_URL
    e2e: GARAGE_E2E_ADMIN_TOKEN
set_env =
    SPARK_LOCAL_IP = 127.0.0.1
