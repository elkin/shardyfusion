name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check slatedb_spark_sharded --python-version 3.11 --error-on-warning

      - name: Type check fallback (pyright)
        run: uv run pyright slatedb_spark_sharded

      - name: Unit and integration tests
        run: tox -e py311-all-spark4-unit,py311-read-integration,py311-writer-spark4-integration

      - name: Build distributions
        run: uv build

  publish:
    name: Publish to PyPI
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Build distributions
        run: uv build

      - name: Publish distributions
        run: uv publish --trusted-publishing always
