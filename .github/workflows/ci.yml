name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load-matrix:
    name: Load CI Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      unit: ${{ steps.matrix.outputs.unit }}
      integration: ${{ steps.matrix.outputs.integration }}
      smoke: ${{ steps.matrix.outputs.smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read committed matrix
        id: matrix
        run: |
          echo "unit=$(jq -c .unit .github/ci-matrix.json)" >> "$GITHUB_OUTPUT"
          echo "integration=$(jq -c .integration .github/ci-matrix.json)" >> "$GITHUB_OUTPUT"
          echo "smoke=$(jq -c .smoke .github/ci-matrix.json)" >> "$GITHUB_OUTPUT"

  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.11
            3.13

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - name: Check CI matrix is up to date
        run: uv run python scripts/generate_ci_matrix.py --check

      - name: Run quality label
        run: uv run tox -m quality

  package:
    name: Package Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - name: Build distributions
        run: uv run tox -e package

      - name: Wheel install smoke test
        run: |
          uv pip install --system --force-reinstall dist/*.whl
          python -c "import shardyfusion; print('import ok')"

  unit:
    if: ${{ github.event_name != 'schedule' }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [load-matrix, quality]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.load-matrix.outputs.unit) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Java
        if: ${{ matrix.needs-java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - uses: ./.github/actions/run-tests
        with:
          tox-env: ${{ matrix.tox-env }}

  integration:
    if: ${{ github.event_name != 'schedule' }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [load-matrix, quality]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.load-matrix.outputs.integration) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Java
        if: ${{ matrix.needs-java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - uses: ./.github/actions/run-tests
        with:
          tox-env: ${{ matrix.tox-env }}

  smoke:
    if: ${{ github.event_name == 'schedule' }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [load-matrix, quality]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.load-matrix.outputs.smoke) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Java
        if: ${{ matrix.needs-java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - uses: ./.github/actions/run-tests
        with:
          tox-env: ${{ matrix.tox-env }}
          collect-coverage: "false"

  coverage:
    if: ${{ github.event_name != 'schedule' && !cancelled() }}
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit, integration]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install coverage
        run: pip install "coverage[toml]>=7.2"

      - name: Download all coverage data
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-data
          merge-multiple: true

      - name: Combine and report
        run: |
          coverage combine coverage-data/
          coverage report
          coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"
          coverage xml
          coverage html

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload combined coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
