name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-matrix:
    name: Prepare Matrices
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      unit: ${{ steps.matrices.outputs.unit }}
      integration: ${{ steps.matrices.outputs.integration }}
      smoke: ${{ steps.matrices.outputs.smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Python 3.13 for type-check envs
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - name: Build tox matrices
        id: matrices
        run: |
          uv run tox -m unit -l > /tmp/tox-unit.txt
          uv run tox -m integration -l > /tmp/tox-integration.txt
          uv run tox -m smoke -l > /tmp/tox-smoke.txt
          python <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import re
          from pathlib import Path

          def build_matrix(path: str) -> str:
              include = []
              for env_name in Path(path).read_text().splitlines():
                  env_name = env_name.strip()
                  if not env_name:
                      continue
                  match = re.match(r"py(\d)(\d{2})-", env_name)
                  if match is None:
                      raise SystemExit(f"Cannot infer Python version from {env_name}")
                  py_minor = int(match.group(2))
                  python_version = f"{match.group(1)}.{py_minor}"
                  include.append(
                      {
                          "name": env_name.replace("-", " / "),
                          "tox-env": env_name,
                          "python-version": python_version,
                          "needs-java": "sparkwriter" in env_name or "-all-" in env_name,
                      }
                  )
              return json.dumps({"include": include})

          print(f"unit={build_matrix('/tmp/tox-unit.txt')}")
          print(f"integration={build_matrix('/tmp/tox-integration.txt')}")
          print(f"smoke={build_matrix('/tmp/tox-smoke.txt')}")
          PY

  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: prepare-matrix

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - name: Run quality label
        run: uv run tox -m quality

  package:
    name: Package Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - name: Build distributions
        run: uv run tox -e package

      - name: Wheel install smoke test
        run: |
          uv pip install --system --force-reinstall dist/*.whl
          python -c "import shardyfusion; print('import ok')"

  unit:
    if: ${{ github.event_name != 'schedule' }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [prepare-matrix, quality]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.unit) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Java
        if: ${{ matrix.needs-java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - name: Run tests
        run: uv run tox -e ${{ matrix.tox-env }}
        env:
          PYTEST_ADDOPTS: "--cov=shardyfusion --cov-report=xml"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.tox-env }}
          path: coverage.xml
          if-no-files-found: ignore

  integration:
    if: ${{ github.event_name != 'schedule' }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [prepare-matrix, quality]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.integration) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Java
        if: ${{ matrix.needs-java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - name: Run tests
        run: uv run tox -e ${{ matrix.tox-env }}

  smoke:
    if: ${{ github.event_name == 'schedule' }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [prepare-matrix, quality]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.smoke) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Java
        if: ${{ matrix.needs-java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv sync --group dev

      - name: Run smoke env
        run: uv run tox -e ${{ matrix.tox-env }}
