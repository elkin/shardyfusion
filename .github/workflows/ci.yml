name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly build on Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check (pyright — all code)
        run: uv run pyright shardyfusion

      - name: Type check (pyright — reader)
        run: uv run pyright -p pyright/read.json

      - name: Type check (pyright — Python writer)
        run: uv run pyright -p pyright/pythonwriter.json

      - name: Type check (pyright — Dask writer)
        run: uv run pyright -p pyright/daskwriter.json

      - name: Type check (pyright — Ray writer)
        run: uv run pyright -p pyright/raywriter.json

      - name: Type check (pyright — Spark writer)
        run: uv run pyright -p pyright/sparkwriter.json

      - name: Schema drift check
        run: uv run python scripts/generate_schemas.py --check

  package:
    name: Package Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Build distributions
        run: uv build

      - name: Wheel install smoke test
        run: |
          uv pip install --system --force-reinstall dist/*.whl
          python -c "import shardyfusion; print('import ok')"

  unit:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "read unit / py3.11"
            python-version: "3.11"
            tox-env: "py311-read-unit"
          - name: "read unit / py3.12"
            python-version: "3.12"
            tox-env: "py312-read-unit"
          - name: "read unit / py3.13"
            python-version: "3.13"
            tox-env: "py313-read-unit"
          - name: "read unit / py3.14"
            python-version: "3.14"
            tox-env: "py314-read-unit"
          - name: "all unit / py3.11 / spark35"
            python-version: "3.11"
            tox-env: "py311-all-spark35-unit"
            needs-java: true
          - name: "all unit / py3.11 / spark4"
            python-version: "3.11"
            tox-env: "py311-all-spark4-unit"
            needs-java: true
          - name: "all unit / py3.12 / spark4"
            python-version: "3.12"
            tox-env: "py312-all-spark4-unit"
            needs-java: true
          - name: "all unit / py3.13 / spark4"
            python-version: "3.13"
            tox-env: "py313-all-spark4-unit"
            needs-java: true
          - name: "sparkwriter unit / py3.11 / spark35"
            python-version: "3.11"
            tox-env: "py311-sparkwriter-spark35-unit"
            needs-java: true
          - name: "sparkwriter unit / py3.11 / spark4"
            python-version: "3.11"
            tox-env: "py311-sparkwriter-spark4-unit"
            needs-java: true
          - name: "sparkwriter unit / py3.12 / spark4"
            python-version: "3.12"
            tox-env: "py312-sparkwriter-spark4-unit"
            needs-java: true
          - name: "sparkwriter unit / py3.13 / spark4"
            python-version: "3.13"
            tox-env: "py313-sparkwriter-spark4-unit"
            needs-java: true
          - name: "sparkwriter unit / py3.14 / spark4"
            python-version: "3.14"
            tox-env: "py314-sparkwriter-spark4-unit"
            needs-java: true
          - name: "pythonwriter unit / py3.11"
            python-version: "3.11"
            tox-env: "py311-pythonwriter-unit"
          - name: "pythonwriter unit / py3.12"
            python-version: "3.12"
            tox-env: "py312-pythonwriter-unit"
          - name: "pythonwriter unit / py3.13"
            python-version: "3.13"
            tox-env: "py313-pythonwriter-unit"
          - name: "pythonwriter unit / py3.14"
            python-version: "3.14"
            tox-env: "py314-pythonwriter-unit"
          - name: "daskwriter unit / py3.11"
            python-version: "3.11"
            tox-env: "py311-daskwriter-unit"
          - name: "daskwriter unit / py3.12"
            python-version: "3.12"
            tox-env: "py312-daskwriter-unit"
          - name: "daskwriter unit / py3.13"
            python-version: "3.13"
            tox-env: "py313-daskwriter-unit"
          - name: "raywriter unit / py3.11"
            python-version: "3.11"
            tox-env: "py311-raywriter-unit"
          - name: "raywriter unit / py3.12"
            python-version: "3.12"
            tox-env: "py312-raywriter-unit"
          - name: "raywriter unit / py3.13"
            python-version: "3.13"
            tox-env: "py313-raywriter-unit"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Set up Java
        if: ${{ matrix.needs-java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Run tests
        run: uv run tox -e ${{ matrix.tox-env }}
        env:
          PYTEST_ADDOPTS: "--cov=shardyfusion --cov-report=xml"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.tox-env }}
          path: coverage.xml
          if-no-files-found: ignore

  integration:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "read integration / py3.11"
            python-version: "3.11"
            tox-env: "py311-read-integration"
          - name: "read integration / py3.12"
            python-version: "3.12"
            tox-env: "py312-read-integration"
          - name: "read integration / py3.13"
            python-version: "3.13"
            tox-env: "py313-read-integration"
          - name: "read integration / py3.14"
            python-version: "3.14"
            tox-env: "py314-read-integration"
          - name: "sparkwriter integration / py3.11 / spark35"
            python-version: "3.11"
            tox-env: "py311-sparkwriter-spark35-integration"
            needs-java: true
          - name: "sparkwriter integration / py3.11 / spark4"
            python-version: "3.11"
            tox-env: "py311-sparkwriter-spark4-integration"
            needs-java: true
          - name: "sparkwriter integration / py3.12 / spark4"
            python-version: "3.12"
            tox-env: "py312-sparkwriter-spark4-integration"
            needs-java: true
          - name: "sparkwriter integration / py3.13 / spark4"
            python-version: "3.13"
            tox-env: "py313-sparkwriter-spark4-integration"
            needs-java: true
          - name: "sparkwriter integration / py3.14 / spark4"
            python-version: "3.14"
            tox-env: "py314-sparkwriter-spark4-integration"
            needs-java: true
          - name: "pythonwriter integration / py3.11"
            python-version: "3.11"
            tox-env: "py311-pythonwriter-integration"
          - name: "pythonwriter integration / py3.12"
            python-version: "3.12"
            tox-env: "py312-pythonwriter-integration"
          - name: "pythonwriter integration / py3.13"
            python-version: "3.13"
            tox-env: "py313-pythonwriter-integration"
          - name: "pythonwriter integration / py3.14"
            python-version: "3.14"
            tox-env: "py314-pythonwriter-integration"
          - name: "daskwriter integration / py3.11"
            python-version: "3.11"
            tox-env: "py311-daskwriter-integration"
          - name: "daskwriter integration / py3.12"
            python-version: "3.12"
            tox-env: "py312-daskwriter-integration"
          - name: "daskwriter integration / py3.13"
            python-version: "3.13"
            tox-env: "py313-daskwriter-integration"
          - name: "raywriter integration / py3.11"
            python-version: "3.11"
            tox-env: "py311-raywriter-integration"
          - name: "raywriter integration / py3.12"
            python-version: "3.12"
            tox-env: "py312-raywriter-integration"
          - name: "raywriter integration / py3.13"
            python-version: "3.13"
            tox-env: "py313-raywriter-integration"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Set up Java
        if: ${{ matrix.needs-java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Run tests
        run: uv run tox -e ${{ matrix.tox-env }}
