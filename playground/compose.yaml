services:
  garage:
    build:
      context: ..
      dockerfile: docker/garage-e2e.Dockerfile
    image: shardyfusion-playground-garage
    ports:
      - "3900:3900"
      - "3903:3903"
    environment:
      GARAGE_ADMIN_TOKEN: "playground-admin-token"
      GARAGE_RPC_SECRET: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/garage-ready"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
