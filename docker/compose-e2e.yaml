services:
  garage:
    build:
      context: ..
      dockerfile: docker/garage-e2e.Dockerfile
    image: slatedb-e2e-garage
    environment:
      GARAGE_ADMIN_TOKEN: "e2e-admin-token-for-testing"
      GARAGE_RPC_SECRET: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/garage-ready"]
      interval: 1s
      timeout: 5s
      retries: 30
      start_period: 5s

  tests:
    image: ${CONTAINER_IMAGE:-shardyfusion-ci}
    depends_on:
      garage:
        condition: service_healthy
    working_dir: /workspace
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/shardyfusion-venv
      GARAGE_E2E_ENDPOINT: "http://garage:3900"
      GARAGE_E2E_ADMIN_URL: "http://garage:3903"
      GARAGE_E2E_ADMIN_TOKEN: "e2e-admin-token-for-testing"
    volumes:
      - ..:/workspace
      - uv-cache:/root/.cache/uv
      - uv-venv:/opt/shardyfusion-venv
      - tox-cache:/workspace/.tox
    command: >-
      /bin/bash -lc "uv sync --all-extras --dev --quiet && uv run tox -m e2e -p 2"

volumes:
  uv-cache:
    name: shardyfusion-uv-cache
  uv-venv:
    name: shardyfusion-uv-venv
  tox-cache:
    name: shardyfusion-tox-cache
