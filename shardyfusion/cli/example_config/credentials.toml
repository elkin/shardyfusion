# credentials.toml — sensitive storage credentials and connection options
# NEVER commit real credentials. Restrict file permissions to 0600:
#   chmod 600 ~/.config/slatefusion/credentials.toml

# ---------------------------------------------------------------------------
# Default profile — used when credentials_profile = "default" in reader.toml
# ---------------------------------------------------------------------------
[default]
# --- credentials ---
# endpoint_url: omit for real AWS; set for S3-compatible services (MinIO, Ceph, etc.)
endpoint_url      = "https://s3.amazonaws.com"
region            = "us-east-1"
access_key_id     = "AKID…"
secret_access_key = "SECRET…"
# session_token   = ""   # optional; for temporary STS credentials

# --- S3 / object-store options ---
# addressing_style: "virtual" (default AWS) | "path" (required for Ceph RGW, MinIO)
addressing_style  = "virtual"
# signature_version: "s3v4" (default) | "s3"
signature_version = "s3v4"
# verify_ssl: true (default) | false (disable SSL verification) | "/path/to/ca-bundle.crt"
verify_ssl        = true
# connect_timeout: seconds before a connection attempt times out
connect_timeout   = 10
# read_timeout: seconds before a read operation times out
read_timeout      = 30
# max_attempts: total attempts including the initial request (initial + retries)
max_attempts      = 3

# ---------------------------------------------------------------------------
# Example: Ceph RGW cluster
# ---------------------------------------------------------------------------
[ceph-prod]
# --- credentials ---
endpoint_url      = "https://ceph.prod.example.com"
region            = "us-east-1"
access_key_id     = "…"
secret_access_key = "…"

# --- S3 / object-store options ---
# Ceph RGW requires path-style addressing
addressing_style  = "path"
verify_ssl        = true
connect_timeout   = 10
read_timeout      = 30
# Ceph may need more retries on a slower WAN link
max_attempts      = 5
